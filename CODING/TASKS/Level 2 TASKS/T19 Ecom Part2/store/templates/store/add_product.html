{% extends 'base.html' %}

{% block title %}Add Product - {{ store.name }}{% endblock %}

{% block content %}
    <h1>Add New Product to {{ store.name }}</h1>
    <p>Fill in the details below to add an item to your inventory.</p>

    <form method="POST" style="background: #f9f9f9; padding: 20px; border: 1px solid #ddd; max-width: 400px;">
        {% csrf_token %}
        
        <label>Product Name:</label>
        <input type="text" name="name" style="width: 100%; margin-bottom: 15px; padding: 8px;" placeholder="e.g. Blue T-Shirt" required>

        <label>Description:</label>
        <textarea name="description" rows="4" style="width: 100%; margin-bottom: 15px; padding: 8px;" placeholder="Describe your product..." required></textarea>

        <label>Price ($):</label>
        <input type="number" step="0.01" name="price" style="width: 100%; margin-bottom: 15px; padding: 8px;" placeholder="0.00" required>

        <label>Stock Quantity:</label>
        <input type="number" name="stock" style="width: 100%; margin-bottom: 15px; padding: 8px;" placeholder="0" required>

        <button type="submit" class="btn btn-add">Save Product</button>
    </form>

    <br>
    <a href="{% url 'manage_products' store.id %}">← Cancel and Go Back</a>
{% endblock %}
