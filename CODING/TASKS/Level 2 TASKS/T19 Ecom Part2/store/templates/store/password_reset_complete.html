{% extends 'base.html' %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div style="text-align: center; padding: 40px 20px;">
    <div style="font-size: 3rem; color: #28a745; margin-bottom: 20px;">✓</div>
    <h2>Password Reset Complete</h2>
    <p style="color: #555; margin-bottom: 30px;">Your new password has been set. You can now log in with your new credentials.</p>
    
    <a href="{% url 'login' %}" class="btn btn-view">Log in here</a>
</div>
{% endblock %}
